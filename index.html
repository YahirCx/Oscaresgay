<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Oscar Descent: Pro Edition</title>
    <style>
        body { margin: 0; background: #050505; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: #00f2ff; font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { border: 2px solid #ff00f7; box-shadow: 0 0 30px rgba(255, 0, 247, 0.3); background: #000; border-radius: 5px; }
        .ui { position: absolute; top: 20px; text-shadow: 0 0 10px #00f2ff; pointer-events: none; text-align: center; }
        #msg { position: absolute; font-size: 50px; color: #ff00f7; text-shadow: 0 0 20px #ff00f7; display: none; z-index: 10; font-weight: bold; transform: rotate(-10deg); }
    </style>
</head>
<body>
    <div class="ui">
        <h1>DESCENT PROTOCOL</h1>
        <p>Flechas/WASD - ¡Llega al fondo!</p>
    </div>
    <div id="msg">OSCAR PENDEJO</div>
    <canvas id="g"></canvas>

<script>
const canvas = document.getElementById('g');
const ctx = canvas.getContext('2d');
canvas.width = 400; canvas.height = 500;

// Configuración de Audio (Sintetizador simple)
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playNote(freq, dur) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square'; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
}

const GRAVITY = 0.35;
const player = { x: 50, y: 30, w: 18, h: 18, vx: 0, vy: 0, speed: 3.5, jump: -7.5, onG: false, onL: false };
const platforms = [
    {x: 0, y: 80, w: 320}, {x: 80, y: 200, w: 320}, {x: 0, y: 350, w: 280},
    {x: 120, y: 500, w: 280}, {x: 0, y: 650, w: 300}, {x: 0, y: 800, w: 400, goal: true}
];
const ladders = [
    {x: 280, y: 80, h: 120}, {x: 100, y: 200, h: 150}, 
    {x: 230, y: 350, h: 150}, {x: 150, y: 500, h: 150}, {x: 20, y: 650, h: 150}
];
const enemies = platforms.slice(1, -1).map(p => ({
    x: p.x + p.w/2, y: p.y - 20, w: 20, h: 20, startX: p.x, endX: p.x + p.w - 20, dir: 1
}));

let camY = 0;
const keys = {};
window.onkeydown = e => { keys[e.code] = true; if(audioCtx.state === 'suspended') audioCtx.resume(); };
window.onkeyup = e => keys[e.code] = false;

function update() {
    if (keys['ArrowLeft'] || keys['KeyA']) player.vx = -player.speed;
    else if (keys['ArrowRight'] || keys['KeyD']) player.vx = player.speed;
    else player.vx = 0;

    player.onL = false;
    ladders.forEach(l => {
        if (player.x + player.w > l.x && player.x < l.x + 20 && player.y + player.h > l.y && player.y < l.y + l.h) player.onL = true;
    });

    if (player.onL) {
        player.vy = 0;
        if (keys['ArrowUp'] || keys['KeyW']) player.vy = -player.speed;
        if (keys['ArrowDown'] || keys['KeyS']) player.vy = player.speed;
    } else {
        player.vy += GRAVITY;
        if ((keys['ArrowUp'] || keys['KeyW'] || keys['Space']) && player.onG) {
            player.vy = player.jump;
            playNote(150, 0.1);
        }
    }

    player.x += player.vx;
    player.y += player.vy;
    player.onG = false;

    platforms.forEach(p => {
        if (player.vy > 0 && player.x + player.w > p.x && player.x < p.x + p.w && player.y + player.h > p.y && player.y + player.h < p.y + 12) {
            if (!(player.onL && (keys['ArrowDown'] || keys['KeyS']))) {
                player.y = p.y - player.h; player.vy = 0; player.onG = true;
                if(p.goal) { 
                    document.getElementById('msg').style.display = 'block';
                    playNote(440, 0.5); playNote(554, 0.5); playNote(659, 0.8);
                    setTimeout(() => location.reload(), 3000);
                }
            }
        }
    });

    enemies.forEach(en => {
        en.x += en.dir * 2;
        if (en.x <= en.startX || en.x >= en.endX) en.dir *= -1;
        if (player.x < en.x + en.w && player.x + player.w > en.x && player.y < en.y + en.h && player.y + player.h > en.y) {
            playNote(100, 0.2); player.x = 50; player.y = 30; camY = 0;
        }
    });

    camY += (player.y - camY - 200) * 0.05;
}

function draw() {
    ctx.setTransform(1,0,0,1,0, -camY);
    ctx.fillStyle = '#000';
    ctx.fillRect(0, camY, canvas.width, canvas.height);

    // Grid de fondo (Efecto Retro)
    ctx.strokeStyle = '#222';
    for(let i=0; i<1000; i+=40) {
        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
    }

    // Escaleras de Neón
    ladders.forEach(l => {
        ctx.strokeStyle = '#00f2ff'; ctx.lineWidth = 2;
        ctx.strokeRect(l.x, l.y, 20, l.h);
        for(let i=0; i<l.h; i+=12) {
            ctx.beginPath(); ctx.moveTo(l.x, l.y+i); ctx.lineTo(l.x+20, l.y+i); ctx.stroke();
        }
    });

    // Plataformas
    platforms.forEach(p => {
        ctx.fillStyle = p.goal ? '#ff00f7' : '#00f2ff';
        ctx.shadowBlur = 10; ctx.shadowColor = ctx.fillStyle;
        ctx.fillRect(p.x, p.y, p.w, 4);
        ctx.shadowBlur = 0;
    });

    // Enemigos
    enemies.forEach(en => {
        ctx.fillStyle = '#ff0000';
        ctx.shadowBlur = 15; ctx.shadowColor = 'red';
        ctx.fillRect(en.x, en.y, en.w, en.h);
        ctx.fillStyle = '#fff'; ctx.font = '10px monospace';
        ctx.fillText("OSCAR", en.x - 5, en.y - 5);
    });

    // Jugador (Cubo de Luz)
    ctx.fillStyle = '#fff';
    ctx.shadowBlur = 20; ctx.shadowColor = '#fff';
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.shadowBlur = 0;

    requestAnimationFrame(() => { update(); draw(); });
}
draw();
</script>
</body>
</html>
