<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>OSCAR DESCENT: OVERDRIVE</title>
    <style>
        body { margin: 0; background: #020205; display: flex; align-items: center; justify-content: center; height: 100vh; color: #fff; font-family: 'Arial Black', sans-serif; overflow: hidden; }
        canvas { border: 2px solid #00f2ff; box-shadow: 0 0 50px rgba(0, 242, 255, 0.2); background: #000; cursor: crosshair; }
        #ui { position: absolute; top: 20px; text-align: center; pointer-events: none; width: 100%; z-index: 5; }
        .glitch { font-size: 24px; animation: glitch 1s infinite; text-shadow: 2px 2px #ff00f7; }
        @keyframes glitch { 0% { transform: skew(0deg); } 20% { transform: skew(3deg); color: #ff00f7; } 40% { transform: skew(-3deg); } 100% { transform: skew(0deg); } }
        #win { position: absolute; font-size: 60px; color: #ff00f7; text-shadow: 0 0 30px #ff00f7; display: none; z-index: 10; text-align: center; }
    </style>
</head>
<body>
    <div id="ui"><h1 class="glitch">OSCAR DESCENT: OVERDRIVE</h1></div>
    <div id="win">OSCAR<br>PENDEJO</div>
    <canvas id="g"></canvas>

<script>
const canvas = document.getElementById('g');
const ctx = canvas.getContext('2d');
canvas.width = 400; canvas.height = 600;

// Audio Engine
const ac = new (window.AudioContext || window.webkitAudioContext)();
const sfx = (f, d, t = 'sine') => {
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = t; o.frequency.setValueAtTime(f, ac.currentTime);
    g.gain.setValueAtTime(0.1, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + d);
    o.connect(g); g.connect(ac.destination);
    o.start(); o.stop(ac.currentTime + d);
};

// Game State
const p = { x: 50, y: 30, w: 20, h: 20, vx: 0, vy: 0, speed: 4, jump: -8, onG: false, onL: false, trail: [] };
const platforms = [
    {x: 0, y: 100, w: 300}, {x: 100, y: 250, w: 300}, {x: 0, y: 400, w: 250},
    {x: 150, y: 550, w: 250}, {x: 0, y: 700, w: 300}, {x: 0, y: 850, w: 400, goal: true}
];
const ladders = [{x: 240, y: 100, h: 150}, {x: 120, y: 250, h: 150}, {x: 200, y: 400, h: 150}, {x: 50, y: 550, h: 150}, {x: 320, y: 700, h: 150}];
const particles = [];
let camY = 0, shake = 0;

const keys = {};
window.onkeydown = e => { keys[e.code] = true; if(ac.state === 'suspended') ac.resume(); };
window.onkeyup = e => keys[e.code] = false;

function update() {
    if (shake > 0) shake -= 0.5;
    
    // Movimiento
    p.vx = (keys['ArrowLeft'] || keys['KeyA']) ? -p.speed : (keys['ArrowRight'] || keys['KeyD']) ? p.speed : 0;

    // Lógica Escalera
    p.onL = ladders.some(l => p.x + p.w > l.x && p.x < l.x + 20 && p.y + p.h > l.y && p.y < l.y + l.h);

    if (p.onL) {
        p.vy = (keys['ArrowUp'] || keys['KeyW']) ? -p.speed : (keys['ArrowDown'] || keys['KeyS']) ? p.speed : 0;
    } else {
        p.vy += 0.4; // Gravedad
        if ((keys['ArrowUp'] || keys['KeyW'] || keys['Space']) && p.onG) { p.vy = p.jump; sfx(200, 0.1, 'triangle'); }
    }

    p.x += p.vx; p.y += p.vy; p.onG = false;

    // Trail particles
    if (Math.abs(p.vx) > 0 || Math.abs(p.vy) > 1) {
        p.trail.push({x: p.x + p.w/2, y: p.y + p.h/2, life: 10});
    }
    p.trail = p.trail.filter(t => t.life-- > 0);

    // Colisiones
    platforms.forEach(plat => {
        if (p.vy > 0 && p.x + p.w > plat.x && p.x < plat.x + plat.w && p.y + p.h > plat.y && p.y + p.h < plat.y + 15) {
            if (!(p.onL && (keys['ArrowDown'] || keys['KeyS']))) {
                p.y = plat.y - p.h; p.vy = 0; p.onG = true;
                if(plat.goal) { 
                    shake = 20; sfx(100, 0.5, 'sawtooth');
                    document.getElementById('win').style.display = 'block';
                    setTimeout(() => location.reload(), 2500);
                }
            }
        }
    });

    camY += (p.y - camY - 200) * 0.1;
}

function draw() {
    ctx.save();
    if (shake > 0) ctx.translate(Math.random()*shake - shake/2, Math.random()*shake - shake/2);
    ctx.setTransform(1,0,0,1,0, -camY);
    ctx.fillStyle = 'rgba(0,0,0,0.3)'; // Motion blur effect
    ctx.fillRect(0, camY, canvas.width, canvas.height);

    // Trail
    p.trail.forEach(t => {
        ctx.fillStyle = `rgba(0, 242, 255, ${t.life/10})`;
        ctx.fillRect(t.x, t.y, 4, 4);
    });

    // Escaleras
    ladders.forEach(l => {
        ctx.strokeStyle = '#00f2ff'; ctx.lineWidth = 3;
        ctx.strokeRect(l.x, l.y, 20, l.h);
        for(let i=0; i<l.h; i+=15) { ctx.beginPath(); ctx.moveTo(l.x, l.y+i); ctx.lineTo(l.x+20, l.y+i); ctx.stroke(); }
    });

    // Plataformas
    platforms.forEach(plat => {
        const grad = ctx.createLinearGradient(plat.x, plat.y, plat.x + plat.w, plat.y);
        grad.addColorStop(0, plat.goal ? '#ff00f7' : '#00f2ff');
        grad.addColorStop(1, '#0055ff');
        ctx.fillStyle = grad;
        ctx.shadowBlur = 15; ctx.shadowColor = plat.goal ? '#ff00f7' : '#00f2ff';
        ctx.fillRect(plat.x, plat.y, plat.w, 8);
    });

    // Jugador
    ctx.fillStyle = '#fff';
    ctx.shadowBlur = 20; ctx.shadowColor = '#fff';
    ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.restore();

    requestAnimationFrame(() => { update(); draw(); });
}
draw();
</script>
</body>
</html>
