<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OSCAR DESCENT: MOBILE OVERDRIVE</title>
    <style>
        body { margin: 0; background: #020205; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: #fff; font-family: 'Arial Black', sans-serif; overflow: hidden; touch-action: none; }
        canvas { border: 2px solid #00f2ff; background: #000; max-width: 100%; max-height: 80vh; }
        #controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; max-width: 400px; padding: 20px; box-sizing: border-box; }
        .btn { background: rgba(255, 255, 255, 0.1); border: 2px solid #00f2ff; color: #00f2ff; padding: 20px; text-align: center; border-radius: 10px; user-select: none; -webkit-user-select: none; }
        .btn:active { background: #00f2ff; color: #000; }
        #win { position: absolute; font-size: 40px; color: #ff00f7; text-shadow: 0 0 20px #ff00f7; display: none; z-index: 10; text-align: center; pointer-events: none; }
    </style>
</head>
<body>
    <div id="win">OSCAR<br>PENDEJO</div>
    <canvas id="g"></canvas>
    
    <div id="controls">
        <div class="btn" id="btnL">←</div>
        <div class="btn" id="btnU">↑ / JUMP</div>
        <div class="btn" id="btnR">→</div>
        <div></div>
        <div class="btn" id="btnD">↓</div>
    </div>

<script>
const canvas = document.getElementById('g');
const ctx = canvas.getContext('2d');
canvas.width = 400; canvas.height = 500;

// Audio
const ac = new (window.AudioContext || window.webkitAudioContext)();
const sfx = (f, d) => {
    const o = ac.createOscillator(), g = ac.createGain();
    o.frequency.setValueAtTime(f, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + d);
    o.connect(g); g.connect(ac.destination);
    o.start(); o.stop(ac.currentTime + d);
};

const p = { x: 50, y: 30, w: 20, h: 20, vx: 0, vy: 0, speed: 4, jump: -8, onG: false, onL: false };
const platforms = [
    {x: 0, y: 100, w: 320}, {x: 80, y: 220, w: 320}, {x: 0, y: 350, w: 280},
    {x: 120, y: 480, w: 280}, {x: 0, y: 620, w: 350}, {x: 0, y: 750, w: 400, goal: true}
];
const ladders = [{x: 280, y: 100, h: 120}, {x: 100, y: 220, h: 130}, {x: 240, y: 350, h: 130}, {x: 140, y: 480, h: 140}, {x: 20, y: 620, h: 130}];
const enemies = platforms.slice(1, -1).map(plt => ({
    x: plt.x + 10, y: plt.y - 22, w: 20, h: 20, min: plt.x, max: plt.x + plt.w - 20, dir: 1.5
}));

let camY = 0, keys = {};
window.onkeydown = e => { keys[e.code] = true; if(ac.state==='suspended') ac.resume(); };
window.onkeyup = e => keys[e.code] = false;

// Touch Events
const setupBtn = (id, key) => {
    const el = document.getElementById(id);
    el.ontouchstart = (e) => { e.preventDefault(); keys[key] = true; if(ac.state==='suspended') ac.resume(); };
    el.ontouchend = (e) => { e.preventDefault(); keys[key] = false; };
};
setupBtn('btnL', 'ArrowLeft'); setupBtn('btnR', 'ArrowRight');
setupBtn('btnU', 'ArrowUp'); setupBtn('btnD', 'ArrowDown');

function update() {
    p.vx = (keys['ArrowLeft'] || keys['KeyA']) ? -p.speed : (keys['ArrowRight'] || keys['KeyD']) ? p.speed : 0;
    p.onL = ladders.some(l => p.x + p.w > l.x && p.x < l.x + 20 && p.y + p.h > l.y && p.y < l.y + l.h);

    if (p.onL) {
        p.vy = (keys['ArrowUp'] || keys['KeyW']) ? -p.speed : (keys['ArrowDown'] || keys['KeyS']) ? p.speed : 0;
    } else {
        p.vy += 0.4;
        if ((keys['ArrowUp'] || keys['KeyW'] || keys['Space']) && p.onG) { p.vy = p.jump; sfx(300, 0.1); }
    }

    p.x += p.vx; p.y += p.vy; p.onG = false;

    // Collider Orillas
    if (p.x < 0) p.x = 0;
    if (p.x + p.w > canvas.width) p.x = canvas.width - p.w;

    // Colisión Plataformas
    platforms.forEach(plat => {
        if (p.vy > 0 && p.x + p.w > plat.x && p.x < plat.x + plat.w && p.y + p.h > plat.y && p.y + p.h < plat.y + 15) {
            if (!(p.onL && (keys['ArrowDown'] || keys['KeyS']))) {
                p.y = plat.y - p.h; p.vy = 0; p.onG = true;
                if(plat.goal) { document.getElementById('win').style.display='block'; sfx(500, 0.5); setTimeout(()=>location.reload(), 3000); }
            }
        }
    });

    // Enemigos Oscar
    enemies.forEach(en => {
        en.x += en.dir;
        if (en.x <= en.min || en.x >= en.max) en.dir *= -1;
        if (p.x < en.x+en.w && p.x+p.w > en.x && p.y < en.y+en.h && p.y+p.h > en.y) {
            sfx(100, 0.2); p.x = 50; p.y = 30; // Muerte
        }
    });

    camY += (p.y - camY - 200) * 0.1;
}

function draw() {
    ctx.setTransform(1,0,0,1,0, -camY);
    ctx.fillStyle = '#050505'; ctx.fillRect(0, camY, canvas.width, canvas.height);

    // Rejilla fondo
    ctx.strokeStyle = '#111';
    for(let i=0; i<1000; i+=50) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(400,i); ctx.stroke(); }

    ladders.forEach(l => {
        ctx.strokeStyle = '#00f2ff'; ctx.lineWidth = 2;
        ctx.strokeRect(l.x, l.y, 20, l.h);
        for(let i=5; i<l.h; i+=15) { ctx.beginPath(); ctx.moveTo(l.x, l.y+i); ctx.lineTo(l.x+20, l.y+i); ctx.stroke(); }
    });

    platforms.forEach(plat => {
        ctx.fillStyle = plat.goal ? '#ff00f7' : '#3498db';
        ctx.shadowBlur = 10; ctx.shadowColor = ctx.fillStyle;
        ctx.fillRect(plat.x, plat.y, plat.w, 8);
    });

    enemies.forEach(en => {
        ctx.fillStyle = '#ff0000'; ctx.shadowBlur = 15;
        ctx.fillRect(en.x, en.y, en.w, en.h);
        ctx.fillStyle = '#fff'; ctx.font = '10px Arial'; ctx.fillText("OSCAR", en.x-5, en.y-5);
    });

    ctx.fillStyle = '#fff'; ctx.shadowBlur = 15; ctx.shadowColor = '#fff';
    ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.shadowBlur = 0;

    requestAnimationFrame(() => { update(); draw(); });
}
draw();
</script>
</body>
</html>
