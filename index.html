<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Oscar's Descent</title>
    <style>
        body { margin: 0; background: #000; display: flex; flex-direction: column; align-items: center; color: white; font-family: sans-serif; overflow: hidden; }
        canvas { border: 4px solid #333; background: #111; margin-top: 20px; }
        .instrucciones { margin-top: 10px; color: #aaa; }
    </style>
</head>
<body>
    <h2>Baja las escaleras (No seas como Oscar)</h2>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <div class="instrucciones">Flechas para moverte y subir/bajar escaleras</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const player = {
    x: 50, y: 20, w: 20, h: 20,
    vx: 0, vy: 0,
    speed: 3,
    onLadder: false
};

// Definición del nivel (Plataformas y Escaleras)
const platforms = [
    {x: 0, y: 50, w: 400, h: 10},   // Piso 0
    {x: 0, y: 150, w: 300, h: 10},  // Piso 1
    {x: 100, y: 250, w: 300, h: 10}, // Piso 2
    {x: 0, y: 350, w: 250, h: 10},  // Piso 3
    {x: 150, y: 450, w: 250, h: 10}, // Piso 4
    {x: 0, y: 550, w: 400, h: 10}   // Meta
];

const ladders = [
    {x: 250, y: 50, w: 30, h: 100},
    {x: 120, y: 150, w: 30, h: 100},
    {x: 200, y: 250, w: 30, h: 100},
    {x: 50, y: 350, w: 30, h: 100},
    {x: 300, y: 450, w: 30, h: 100}
];

const keys = {};
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

function update() {
    // Movimiento lateral
    if (keys['ArrowLeft']) player.x -= player.speed;
    if (keys['ArrowRight']) player.x += player.speed;

    // Detectar si está en una escalera
    player.onLadder = false;
    ladders.forEach(l => {
        if (player.x + player.w > l.x && player.x < l.x + l.w &&
            player.y + player.h > l.y && player.y < l.y + l.h) {
            player.onLadder = true;
        }
    });

    if (player.onLadder) {
        player.vy = 0;
        if (keys['ArrowUp']) player.vy = -player.speed;
        if (keys['ArrowDown']) player.vy = player.speed;
    } else {
        // Gravedad si no está en escalera
        player.vy = 2; 
    }

    player.y += player.vy;

    // Colisión con plataformas (solo si cae)
    platforms.forEach(p => {
        if (player.vy >= 0 && 
            player.x + player.w > p.x && player.x < p.x + p.w &&
            player.y + player.h > p.y && player.y + player.h < p.y + p.h + 5) {
            if (!keys['ArrowDown'] || !player.onLadder) {
                player.y = p.y - player.h;
            }
        }
    });

    // Mensaje final (Easter Egg)
    if (player.y > 530) {
        alert("¡Ganaste! Oscar pendejo.");
        player.y = 20; player.x = 50;
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Dibujar Escaleras
    ctx.fillStyle = '#555';
    ladders.forEach(l => {
        ctx.fillRect(l.x, l.y, l.w, l.h);
        // Peldaños
        ctx.strokeStyle = '#888';
        for(let i = 0; i < l.h; i+=10) {
            ctx.beginPath(); ctx.moveTo(l.x, l.y+i); ctx.lineTo(l.x+l.w, l.y+i); ctx.stroke();
        }
    });

    // Dibujar Plataformas
    ctx.fillStyle = '#27ae60';
    platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

    // Dibujar Jugador
    ctx.fillStyle = '#e74c3c';
    ctx.fillRect(player.x, player.y, player.w, player.h);

    requestAnimationFrame(() => {
        update();
        draw();
    });
}

draw();
</script>
</body>
</html>
