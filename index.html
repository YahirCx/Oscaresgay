<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora Galáctica</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: radial-gradient(circle, #1b2735 0%, #090a0f 100%); margin: 0; }
        .calc { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); width: 320px; }
        input { width: 100%; height: 60px; font-size: 24px; text-align: right; margin-bottom: 20px; border: none; background: transparent; color: #fff; outline: none; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { padding: 20px; font-size: 18px; border: none; border-radius: 50%; cursor: pointer; background: rgba(255,255,255,0.1); color: white; transition: 0.3s; }
        button:hover { background: rgba(255,255,255,0.3); transform: scale(1.1); }
        .op { background: #f39c12; }
        .msg { color: #ff4757; font-weight: bold; font-size: 14px; text-align: center; margin-top: 10px; min-height: 20px; }
    </style>
</head>
<body>

<div class="calc">
    <input id="pantalla" placeholder="0" readonly>
    <div class="grid">
        <button onclick="limpiar()">C</button>
        <button onclick="agregar('(')">(</button>
        <button onclick="agregar(')')">)</button>
        <button class="op" onclick="agregar('/')">÷</button>
        <button onclick="agregar('7')">7</button>
        <button onclick="agregar('8')">8</button>
        <button onclick="agregar('9')">9</button>
        <button class="op" onclick="agregar('*')">×</button>
        <button onclick="agregar('4')">4</button>
        <button onclick="agregar('5')">5</button>
        <button onclick="agregar('6')">6</button>
        <button class="op" onclick="agregar('-')">-</button>
        <button onclick="agregar('1')">1</button>
        <button onclick="agregar('2')">2</button>
        <button onclick="agregar('3')">3</button>
        <button class="op" onclick="agregar('+')">+</button>
        <button onclick="agregar('0')" style="grid-column: span 2; border-radius: 30px;">0</button>
        <button onclick="agregar('.')">.</button>
        <button class="op" onclick="calcular()">=</button>
    </div>
    <div id="mensaje" class="msg"></div>
</div>

<script>
    const p = document.getElementById('pantalla');
    const m = document.getElementById('mensaje');
    const agregar = (v) => p.value += v;
    const limpiar = () => { p.value = ''; m.innerText = ''; };
    const calcular = () => {
        try {
            let res = eval(p.value);
            if (res === 42) {
                p.value = "Oscar Pendejo";
                m.innerText = "Vamos a ver Mario gay";
            } else {
                p.value = res;
                m.innerText = "";
            }
        } catch {
            p.value = "Error";
            setTimeout(limpiar, 1000);
        }
    }
</script>

</body>
</html>
