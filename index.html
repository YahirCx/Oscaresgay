<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora v2.1</title>
    <style>
        body { font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; background: #111; color: #eee; }
        .calc { background: #222; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        input { width: 100%; height: 60px; font-size: 28px; text-align: right; margin-bottom: 15px; border: 2px solid #444; border-radius: 8px; padding: 10px; box-sizing: border-box; background: #333; color: #fff; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        button { padding: 22px; font-size: 20px; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; background: #444; color: #fff; }
        button:hover { background: #555; }
        .op { background: #d35400; color: white; }
        .op:hover { background: #e67e22; }
        .eq { background: #27ae60; color: white; grid-column: span 2; }
        .eq:hover { background: #2ecc71; }
        .clr { background: #c0392b; color: white; }
        .clr:hover { background: #e74c3c; }
    </style>
</head>
<body>

<div class="calc">
    <input id="pantalla" readonly>
    <div class="grid">
        <button class="clr" onclick="limpiar()">C</button>
        <button onclick="agregar('(')">(</button>
        <button onclick="agregar(')')">)</button>
        <button class="op" onclick="agregar('/')">/</button>
        <button onclick="agregar('7')">7</button>
        <button onclick="agregar('8')">8</button>
        <button onclick="agregar('9')">9</button>
        <button class="op" onclick="agregar('*')">x</button>
        <button onclick="agregar('4')">4</button>
        <button onclick="agregar('5')">5</button>
        <button onclick="agregar('6')">6</button>
        <button class="op" onclick="agregar('-')">-</button>
        <button onclick="agregar('1')">1</button>
        <button onclick="agregar('2')">2</button>
        <button onclick="agregar('3')">3</button>
        <button class="op" onclick="agregar('+')">+</button>
        <button onclick="agregar('0')">0</button>
        <button onclick="agregar('.')">.</button>
        <button class="eq" onclick="calcular()">=</button>
    </div>
</div>

<script>
    const p = document.getElementById('pantalla');
    const agregar = (v) => p.value += v;
    const limpiar = () => p.value = '';
    const calcular = () => {
        try {
            let resultado = eval(p.value);
            // LA LÓGICA PERSONALIZADA
            if (resultado === 42) {
                p.value = "Oscar pendejo";
            } else {
                p.value = resultado;
            }
        } 
        catch { 
            p.value = "Error"; 
            setTimeout(limpiar, 1200); 
        }
    }
</script>

</body>
</html>
