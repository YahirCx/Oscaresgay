<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Super Calculadora</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #222; }
        .calc { background: #333; padding: 20px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; height: 50px; font-size: 24px; text-align: right; margin-bottom: 10px; border: none; border-radius: 5px; padding: 5px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { padding: 20px; font-size: 18px; border: none; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        button:hover { background: #ddd; }
        .op { background: #f39c12; color: white; }
    </style>
</head>
<body>

<div class="calc">
    <input id="pantalla" readonly>
    <div class="grid">
        <button onclick="limpiar()">C</button>
        <button onclick="agregar('(')">(</button>
        <button onclick="agregar(')')">)</button>
        <button class="op" onclick="agregar('/')">/</button>
        <button onclick="agregar('7')">7</button>
        <button onclick="agregar('8')">8</button>
        <button onclick="agregar('9')">9</button>
        <button class="op" onclick="agregar('*')">x</button>
        <button onclick="agregar('4')">4</button>
        <button onclick="agregar('5')">5</button>
        <button onclick="agregar('6')">6</button>
        <button class="op" onclick="agregar('-')">-</button>
        <button onclick="agregar('1')">1</button>
        <button onclick="agregar('2')">2</button>
        <button onclick="agregar('3')">3</button>
        <button class="op" onclick="agregar('+')">+</button>
        <button onclick="agregar('0')" style="grid-column: span 2;">0</button>
        <button onclick="agregar('.')">.</button>
        <button class="op" onclick="calcular()">=</button>
    </div>
</div>

<script>
    const p = document.getElementById('pantalla');
    const agregar = (v) => p.value += v;
    const limpiar = () => p.value = '';
    const calcular = () => {
        try { p.value = eval(p.value); } 
        catch { p.value = "Error"; setTimeout(limpiar, 1000); }
    }
</script>

</body>
</html>
